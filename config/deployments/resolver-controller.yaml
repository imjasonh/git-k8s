apiVersion: apps/v1
kind: Deployment
metadata:
  name: resolver-controller
  namespace: git-system
  labels:
    app.kubernetes.io/name: git-k8s
    app.kubernetes.io/component: resolver-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: resolver-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git-k8s
        app.kubernetes.io/component: resolver-controller
    spec:
      serviceAccountName: git-k8s-controller
      containers:
        - name: controller
          # ko will replace this with the actual registry image SHA.
          image: ko://github.com/imjasonh/git-k8s/cmd/resolver-controller
          env:
            - name: SYSTEM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CONFIG_LOGGING_NAME
              value: config-logging
            - name: CONFIG_OBSERVABILITY_NAME
              value: config-observability
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
