apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gitrepositories.git-k8s.imjasonh.com
spec:
  group: git-k8s.imjasonh.com
  names:
    kind: GitRepository
    listKind: GitRepositoryList
    plural: gitrepositories
    singular: gitrepository
    shortNames:
      - gitrepo
    categories:
      - git
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  description: Clone URL of the Git repository.
                defaultBranch:
                  type: string
                  description: Default branch name (e.g., "main").
                  default: main
                auth:
                  type: object
                  properties:
                    secretRef:
                      type: object
                      properties:
                        name:
                          type: string
                      required:
                        - name
                pollInterval:
                  type: string
                  description: How often to poll the remote for ref changes (e.g., "5s", "30s", "1m").
                cache:
                  type: object
                  description: On-disk caching configuration for this repository.
                  properties:
                    enabled:
                      type: boolean
                      description: Whether on-disk caching should be used for this repo.
                  required:
                    - enabled
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                lastFetchTime:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: URL
          type: string
          jsonPath: .spec.url
        - name: Branch
          type: string
          jsonPath: .spec.defaultBranch
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
